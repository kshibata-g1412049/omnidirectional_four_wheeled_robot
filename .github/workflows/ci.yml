name: CI

# Builds the Docker image (colcon build inside) and runs the headless
# functional smoke test (controllers active + /cmd_vel rotates the wheels).
# GitHub-hosted runners have open network access, so the ROS base image and
# packages.ros.org are reachable here.

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

# Avoid duplicate runs (push + pull_request) for the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image and run headless smoke test
        run: bash scripts/docker_build_and_test.sh omni4wd:ci
